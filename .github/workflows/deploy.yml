name: Deploy

# The Codex is released manually (`make release`: tag push + PyPI upload, no
# GitHub Release), so deployment is a manual step: run this workflow from the
# Actions tab once the new version is on PyPI, picking the target environment.
on:
  workflow_dispatch:
    inputs:
      environment:
        description: Codex environment to deploy
        type: choice
        options: [prod, beta]
        default: prod

concurrency:
  group: deploy-${{ github.event.inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Codex (${{ github.event.inputs.environment }})
    runs-on: ubuntu-latest
    # both environments live on the same host; its DEPLOY_* creds sit in the
    # `production` GitHub environment (pushed by server-setup's `just sync`)
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Ansible
        run: pip install ansible

      - name: Install Ansible collections
        working-directory: deploy
        run: ansible-galaxy collection install -r requirements.yml

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy
          chmod 600 ~/.ssh/deploy
          printf '%s\n' "${{ vars.DEPLOY_HOST_KEY }}" >> ~/.ssh/known_hosts

      - name: Run deploy playbook
        working-directory: deploy
        run: |
          ansible-playbook deploy.yml \
            -i "${{ vars.DEPLOY_HOST }}," \
            --user deploy --private-key ~/.ssh/deploy \
            -e "codex_env=${{ github.event.inputs.environment }}"
